workflows:
  foco-na-meta-mobile:
    name: Build iOS App
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    groups:
      - assinatura_ios
    scripts:
      - name: Instalação de dependências
        script: npm install --legacy-peer-deps
      - name: Build do App
        script: npm run build