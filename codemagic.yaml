workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.meufaturamento.app
    scripts:
      - name: Instalar dependências
        script: |
          npm cache clean --force
          npm install --include=dev --legacy-peer-deps
      - name: Build Web
        script: npm run build
      - name: Sincronizar iOS nativo
        script: npx cap sync ios
      - name: Configurar Keychain
        script: keychain initialize
      - name: Adicionar Certificados Globais
        script: keychain add-certificates
      - name: Aplicar perfis de assinatura no Xcode
        script: |
          cd ios/App
          xcode-project use-profiles
      - name: Resolver Dependências do SPM (Swift)
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies -project "App.xcodeproj" -scheme "App"
      - name: Atualizar Build Number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Compilar o App (Gerar IPA)
        script: |
          cd ios/App
          xcode-project build-ipa --project "App.xcodeproj" --scheme "App"
    artifacts:
      - "**/build/ios/ipa/*.ipa"
