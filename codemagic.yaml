workflows:
  foco-na-meta-mobile:
    name: Build iOS and Android App
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - ios_signing # Variáveis de ambiente para iOS Code Signing (Adicione no painel do Codemagic)
        - android_signing # Variáveis de ambiente para Android Keystore (Adicione no painel do Codemagic)
    
    scripts:
      - name: Instalação de dependências
        script: npm install --legacy-peer-deps
      
      - name: Build de produção do frontend
        script: npm run build
      
      - name: Sincronização do Capacitor
        script: npx cap sync
      
      - name: Preparar ambiente iOS
        script: |
          cd ios/App
          pod install
      
      - name: Build Nativo para iOS
        script: |
          cd ios/App
          # Adicione o setup de code signing do Codemagic aqui (xcode-project use-profiles)
          xcodebuild build -workspace App.xcworkspace -scheme App -destination generic/platform=iOS -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO
          # O CODE_SIGNING_ALLOWED=NO permite que o build passe sem credenciais reais no momento, mas para produção você precisará substituir pela assinatura correta.

      - name: Build Nativo para Android
        script: |
          cd android
          # Adicione o setup do keystore aqui se necessário
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
      - ios/build/ios/ipa/*.ipa
      - ios/App/build/Build/Products/*-iphoneos/*.app
