workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - assinatura_ios
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Instalar dependências
        script: npm install --legacy-peer-deps
      - name: Build Web
        script: npm run build
      - name: Sincronizar iOS nativo
        script: |
          npx cap sync ios || npx cap add ios
      - name: Preparar CocoaPods (Busca Dinâmica)
        script: |
          POD_PATH=$(find . -name "Podfile" | head -n 1)
          echo "Podfile encontrado em: $POD_PATH"
          cd $(dirname "$POD_PATH")
          pod install
      - name: Compilar o App (Busca Dinâmica)
        script: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -n 1)
          WORKSPACE_DIR=$(dirname "$WORKSPACE_PATH")
          WORKSPACE_NAME=$(basename "$WORKSPACE_PATH")
          echo "Compilando workspace: $WORKSPACE_NAME no diretório: $WORKSPACE_DIR"
          cd "$WORKSPACE_DIR"
          xcode-project build-ipa --workspace "$WORKSPACE_NAME" --scheme "App"
    artifacts:
      - "**/build/ios/ipa/*.ipa"
