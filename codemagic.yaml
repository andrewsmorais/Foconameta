workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      groups:
        - assinatura_ios
      node: latest
      xcode: latest
    scripts:
      - name: Instalar dependências
        script: npm install --legacy-peer-deps
      - name: Build Web
        script: npm run build
      - name: Sincronizar iOS nativo
        script: npx cap sync ios
      - name: Configurar chaves de assinatura (Keychain)
        script: |
          keychain initialize
          keychain add-certificates
      - name: Aplicar perfis de assinatura no Xcode
        script: |
          cd ios/App
          xcode-project use-profiles
      - name: Compilar o App (Gerar IPA)
        script: |
          cd ios/App
          xcode-project build-ipa --project "App.xcodeproj" --scheme "App"
    artifacts:
      - "**/build/ios/ipa/*.ipa"
